<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e74c3c">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/741/741407.png">
    <title>Federico | Motorsport PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="music-card" id="player">
        <p id="song-title">Listo para la carrera...</p>
        <div class="btns">
            <button onclick="changeSong(-1)">⏮</button>
            <button id="btn-play" onclick="playMusic()">▶</button>
            <button onclick="changeSong(1)">⏭</button>
        </div>
        <div class="controls">
            <div class="vol-row">
                <button onclick="changeVolume(0.1)">+</button>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="1" onchange="actualizarVolumenDirecto(this.value)">
                <button onclick="changeVolume(-0.1)">-</button>
            </div>
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0" onchange="seekSong()">
                <span id="duration-time">0:00</span>
            </div>
        </div>
    </div>

    <header>
        <h1>FEDE<span>RICO</span></h1>
    </header>

    <section id="editor">
        <h2>Diseñador de Carrocería</h2>
        <div class="canvas-container">
            <div class="drawing-toolbar">
                <input type="color" id="colorPicker" value="#e74c3c" onchange="setTool('brush')">
                <input type="range" id="brushSize" min="1" max="20" value="5">
                <button onclick="setTool('brush')">🖌️</button>
                <button onclick="setTool('eraser')">🧽</button>
                <button onclick="clearCanvas()">🗑️</button>
            </div>
            <canvas id="paintCanvas" width="600" height="400"></canvas>
            <div class="actions">
                <button class="btn-3d" onclick="convertTo3D()">🚀 Generar Modelo 3D</button>
            </div>
        </div>
        <div id="container3d"></div> 
    </section>

    <section id="news-section">
        <h2>Últimas Noticias!</h2>
        <div id="news-container" class="news-grid">Cargando noticias...</div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="app.js"></script>
</body>
</html>
