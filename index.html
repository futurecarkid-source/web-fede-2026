<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e74c3c">
    <title>Federico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-card" id="player">
        <p id="song-title">Cargando música...</p>
        <input type="range" id="vol-control" min="0" max="1" step="0.1">
        <div class="btns">
            <button onclick="changeSong(-1)">⏮</button>
            <button onclick="playMusic()">▶</button>
            <button onclick="changeSong(1)">⏭</button>
        </div>
    </div>

    <header>
        <h1>FEDE<span>RICO</span></h1>
        <button id="theme-toggle">🌓 Modo Oscuro</button>
    </header>

    <section id="customizer">
        <h2>Diseñar</h2>
        <canvas id="canvasDibujo"></canvas>
        <div class="controls">
            <button onclick="borrar()">Limpiar</button>
            <button class="btn-primary" onclick="procesar3D()">Ver en 3D</button>
        </div>
    </section>

    <section id="news-section">
        <h2>Últimas Noticias</h2>
        <div id="news-container">Cargando noticias del mundo...</div>
    </section>

    <script src="app.js"></script>
</body>

</html>
